<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rive Render Test</title>
  <style>
    body {
      margin: 24px;
      font-family: Menlo, Monaco, Consolas, monospace;
      background: #101418;
      color: #d7e0ea;
    }
    h1 {
      margin-bottom: 8px;
    }
    .subtitle {
      margin: 0 0 24px;
      color: #9fb0c0;
      font-size: 15px;
    }
    .totals {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .totals p {
      margin: 0;
      padding: 10px 14px;
      background: #182028;
      border-radius: 8px;
      font-size: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .card {
      background: #182028;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2b3947;
    }
    .card.pass {
      box-shadow: inset 0 0 0 1px rgba(90, 180, 110, 0.35);
    }
    .card.fail {
      box-shadow: inset 0 0 0 1px rgba(220, 80, 80, 0.35);
    }
    .card-link {
      color: inherit;
      text-decoration: none;
      display: block;
    }
    .thumb {
      aspect-ratio: 16 / 9;
      background: #0b0f13;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid #2b3947;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .missing-thumb {
      color: #8fa1b2;
      font-size: 14px;
    }
    h2 {
      font-size: 18px;
      margin: 14px 16px 8px;
    }
    .score, .collection, .empty {
      margin: 0 16px 14px;
    }
    .score {
      font-weight: 600;
    }
    .collection {
      color: #9fb0c0;
      font-size: 13px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Rive Render Test</h1>
  <p class="subtitle">PR #254 run #23947008416 2026-04-03 13:04:30 UTC</p>
  <div class="totals">
    <p>✅ 0 passed</p>
    <p>❌ 0 failed</p>
  </div>
  <section class="grid">
    <p class="empty">No test reports found.</p>
  </section>
</body>
</html>
