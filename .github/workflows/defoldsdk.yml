name: Defold SDK Setup

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      defold_channel:
        required: false
        type: string
        default: stable
      defold_version:
        required: false
        type: string
        default: "latest"
      sdk_output_path:
        required: false
        type: string
        default: "build/defoldsdk"
      bob_output_path:
        required: false
        type: string
        default: "bob.jar"

jobs:
  prepare:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Resolve Defold version
        id: resolve-version
        shell: bash
        run: |
          set -euo pipefail
          CHANNEL="${{ inputs.defold_channel }}"
          VERSION="${{ inputs.defold_version }}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "latest" ]; then
            VERSION="$(CHANNEL="${CHANNEL}" REQUESTED_VERSION="${VERSION:-latest}" python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          channel = os.environ["CHANNEL"]
          requested_version = os.environ.get("REQUESTED_VERSION", "latest") or "latest"
          base = "https://api.github.com/repos/defold/defold"

          if channel == "stable" and requested_version == "latest":
              with urllib.request.urlopen(f"{base}/releases/latest") as response:
                  print(json.load(response)["tag_name"])
          elif channel in ("alpha", "beta") and requested_version == "latest":
              with urllib.request.urlopen(f"{base}/releases?per_page=100") as response:
                  releases = json.load(response)

              suffix = f"-{channel}"
              candidates = []
              for release in releases:
                  tag = release.get("tag_name", "")
                  if not tag.endswith(suffix):
                      continue
                  version = tag[: -len(suffix)]
                  match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", version)
                  if not match:
                      continue
                  candidates.append(((int(match[1]), int(match[2]), int(match[3])), tag))

              if not candidates:
                  raise SystemExit(f"No {channel} release tags found in GitHub releases")

              candidates.sort(reverse=True)
              print(candidates[0][1])
          elif requested_version != "latest":
              print(requested_version)
          else:
              raise SystemExit(f"Unsupported channel/version combination: channel={channel}, version={requested_version}")
          PY
            )"
          fi
          echo "defold_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using Defold version: ${VERSION}"

      - name: Cache Defold SDK and bob.jar
        id: cache-defoldsdk
        uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.bob_output_path }}
            ${{ inputs.sdk_output_path }}
          key: defoldsdk-${{ steps.resolve-version.outputs.defold_version }}
          enableCrossOsArchive: true

      - name: Download and extract Defold SDK
        if: steps.cache-defoldsdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-version.outputs.defold_version }}"
          BASE_URL="https://github.com/defold/defold/releases/download/${VERSION}"
          SDK_URL="${BASE_URL}/defoldsdk.zip"
          SDK_ROOT="${{ inputs.sdk_output_path }}"
          SDK_ZIP="${SDK_ROOT%/}.zip"

          mkdir -p "$(dirname "${SDK_ROOT}")"
          rm -rf "${SDK_ROOT}"
          rm -f "${SDK_ZIP}"

          echo "Downloading ${SDK_URL}"
          curl -fSL -o "${SDK_ZIP}" "${SDK_URL}"

          mkdir -p "${SDK_ROOT}"
          if command -v unzip >/dev/null 2>&1; then
            unzip -q "${SDK_ZIP}" -d "${SDK_ROOT}"
          else
            tar -xf "${SDK_ZIP}" -C "${SDK_ROOT}"
          fi
          rm -f "${SDK_ZIP}"

          if [ ! -d "${SDK_ROOT}/defoldsdk" ]; then
            echo "Expected SDK folder missing: ${SDK_ROOT}/defoldsdk" >&2
            exit 1
          fi

      - name: Download bob.jar
        if: steps.cache-defoldsdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-version.outputs.defold_version }}"
          BASE_URL="https://github.com/defold/defold/releases/download/${VERSION}"
          BOB_URL="${BASE_URL}/bob.jar"
          BOB_PATH="${{ inputs.bob_output_path }}"
          mkdir -p "$(dirname "${BOB_PATH}")"
          rm -f "${BOB_PATH}"
          echo "Downloading ${BOB_URL}"
          curl -fSL -o "${BOB_PATH}" "${BOB_URL}"

      - name: Export DYNAMO_HOME and BOB
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${{ inputs.sdk_output_path }}"
          BOB_PATH="${{ inputs.bob_output_path }}"
          if [ ! -d "${SDK_ROOT}/defoldsdk" ]; then
            echo "Expected SDK folder missing: ${SDK_ROOT}/defoldsdk" >&2
            exit 1
          fi
          if [ ! -f "${BOB_PATH}" ]; then
            echo "Expected bob.jar missing: ${BOB_PATH}" >&2
            exit 1
          fi
          echo "DYNAMO_HOME=$(realpath "${SDK_ROOT}/defoldsdk")" >> "$GITHUB_ENV"
          echo "BOB=$(realpath "${BOB_PATH}")" >> "$GITHUB_ENV"
