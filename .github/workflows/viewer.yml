name: Build Viewer

on:
  push:

jobs:
  prepare-defoldsdk:
    name: defoldsdk
    uses: ./.github/workflows/defoldsdk.yml
    with:
      runner: ubuntu-22.04
      defold_channel: alpha
      defold_version: latest
      sdk_output_path: build/defoldsdk
      bob_output_path: bob.jar

  build-viewer:
    name: viewer-${{ matrix.platform }}
    needs: prepare-defoldsdk
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: x86_64-linux
          - os: macos-latest
            platform: arm64-macos
          - os: windows-2022
            platform: x86_64-win32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Temurin Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup CMake
        uses: lukka/get-cmake@v4.1.1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            uuid-dev \
            mesa-common-dev \
            libgl1-mesa-dev \
            libglx-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxxf86vm-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install ninja

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: 2022

      - name: Restore Defold SDK and bob.jar from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            bob.jar
            build/defoldsdk
          key: ${{ needs.prepare-defoldsdk.outputs.defoldsdk_cache_key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Build viewer
        shell: bash
        env:
          DYNAMO_HOME: ${{ github.workspace }}/build/defoldsdk/defoldsdk
          BOB: ${{ github.workspace }}/bob.jar
        run: |
          set -euo pipefail
          ./utils/viewer/build.sh --config Release "${{ matrix.platform }}"

      - name: Upload viewer artifact
        uses: actions/upload-artifact@v4
        with:
          name: viewer-${{ matrix.platform }}
          path: utils/viewer/build/${{ matrix.platform }}
          if-no-files-found: error
