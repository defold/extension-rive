name: HTML5 Tests

on:
  pull_request:

env:
  REPORTS_REPOSITORY: defold/test-reports
  REPORTS_BRANCH: gh-pages
  REPORTS_SUBFOLDER: extension-rive

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  prepare-defoldsdk:
    name: defoldsdk
    uses: defold/github-actions-common/.github/workflows/defoldsdk.yml@master
    with:
      runner: ${{ github.event.inputs.platform == 'arm64-linux' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
      defold_channel: alpha
      defold_version: ${{ github.event.inputs.defold_version || 'latest' }}
      sdk_output_path: build/defoldsdk
      bob_output_path: bob.jar

  test-html5:
    runs-on: ubuntu-latest
    needs: [prepare-defoldsdk]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Temurin Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup ImageMagick
        uses: mfinelli/setup-imagemagick@v7
        with:
          cache: true
          install-libfuse2: true

      - name: Restore Defold SDK and bob.jar from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            bob.jar
            build/defoldsdk
          key: ${{ needs.prepare-defoldsdk.outputs.defoldsdk_cache_key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Build wasm-web bundle
        shell: bash
        env:
          BOB: ${{ github.workspace }}/bob.jar
        run: |
          set -euo pipefail
          rm -rf bundle_web

          java -jar "${BOB}" \
            --archive \
            --bo bundle_web \
            --variant=debug \
            --build-server=https://build-stage.defold.com \
            --platform=wasm-web \
            --architectures=wasm-web \
            --brjson bundle_web/build-report.json \
            --with-symbols \
            resolve build bundle

      - name: Pack wasm-web bundle zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          rm -f "build/html5-bundle-pr-${{ github.event.pull_request.number }}.zip"
          (
            cd bundle_web
            zip -qr "../build/html5-bundle-pr-${{ github.event.pull_request.number }}.zip" .
          )

      - name: Upload wasm-web bundle zip
        uses: actions/upload-artifact@v4
        with:
          name: html5-bundle-pr-${{ github.event.pull_request.number }}
          path: build/html5-bundle-pr-${{ github.event.pull_request.number }}.zip
          if-no-files-found: error
          retention-days: 30

      - name: Run HTML5 collection tests
        id: run-tests
        shell: bash
        run: |
          set -euo pipefail
          ./ci/tests/html5/test.sh

      - name: Upload HTML5 test report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html5-test-report-pr-${{ github.event.pull_request.number }}
          path: build/render-tests/wasm-web
          if-no-files-found: error
          retention-days: 30

  test-android:
    runs-on: ubuntu-latest
    needs: [prepare-defoldsdk]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Temurin Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup ImageMagick
        uses: mfinelli/setup-imagemagick@v7
        with:
          cache: true
          install-libfuse2: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Android NDK r25c (25.2.9519653)
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Export ANDROID_NDK env
        shell: bash
        run: |
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "Using ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}"

      - name: Configure Android toolchain environment
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_NDK_HOME=${ANDROID_NDK}" >> "$GITHUB_ENV"
          echo "NDK_PATH=${ANDROID_NDK}" >> "$GITHUB_ENV"
          echo "ANDROID_API=21" >> "$GITHUB_ENV"

      - name: Restore Defold SDK and bob.jar from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            bob.jar
            build/defoldsdk
          key: ${{ needs.prepare-defoldsdk.outputs.defoldsdk_cache_key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Enable KVM
        shell: bash
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build arm64-android bundle
        shell: bash
        env:
          BOB: ${{ github.workspace }}/bob.jar
        run: |
          set -euo pipefail
          rm -rf bundle_android

          java -jar "${BOB}" \
            --archive \
            --bo bundle_android \
            --variant=debug \
            --build-server=https://build-stage.defold.com \
            --platform=arm64-android \
            --architectures=arm64-android \
            --brjson bundle_android/build-report.json \
            --with-symbols \
            resolve build bundle

      - name: Run Android collection tests
        timeout-minutes: 5
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-linux-hw-accel: false
          script: |
            set -euo pipefail
            ./ci/rendertest/android/install.sh \
              --apk ./bundle_android/extensionrive/extensionrive.apk
            ./ci/tests/android/test.sh

      - name: Upload Android test report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report-pr-${{ github.event.pull_request.number }}
          path: build/render-tests/arm64-android
          if-no-files-found: error
          retention-days: 30

  build-summary:
    if: always()
    needs:
      - test-html5
      - test-android
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    outputs:
      pass_count: ${{ steps.summary.outputs.pass_count }}
      fail_count: ${{ steps.summary.outputs.fail_count }}
      total_count: ${{ steps.summary.outputs.total_count }}
      report_artifact_url: ${{ steps.upload-report.outputs.artifact-url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download HTML5 test report artifact
        uses: actions/download-artifact@v4
        with:
          name: html5-test-report-pr-${{ github.event.pull_request.number }}
          path: build/render-tests/html5

      - name: Download Android test report artifact
        uses: actions/download-artifact@v4
        with:
          name: android-test-report-pr-${{ github.event.pull_request.number }}
          path: build/render-tests/android

      - name: Build combined test summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          reports_repo="${REPORTS_REPOSITORY}"
          reports_owner="${reports_repo%%/*}"
          reports_name="${reports_repo#*/}"
          reports_subfolder="${REPORTS_SUBFOLDER}"
          site_path_prefix=""
          if [[ -n "${reports_subfolder}" ]]; then
            site_path_prefix="${reports_subfolder}/"
          fi
          repo_url_root="https://${reports_owner}.github.io/${reports_name}/${site_path_prefix}pr-${{ github.event.pull_request.number }}/"

          python3 ./ci/rendertest/build_summary.py \
            --reports-root ./build/render-tests \
            --output ./build/render-tests/index.html \
            --summary-md ./build/render-tests/summary.md \
            --repo-url-root "${repo_url_root}" \
            --title "Rive Render Test" \
            --subtitle "PR #${{ github.event.pull_request.number }} run #${{ github.run_id }} $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          summary = json.loads(Path("build/render-tests/summary.json").read_text())
          print(f"pass_count={summary['pass_count']}")
          print(f"fail_count={summary['fail_count']}")
          print(f"total_count={summary['total_count']}")
          PY

      - name: Upload combined render test report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-test-report-pr-${{ github.event.pull_request.number }}
          path: build/render-tests/
          if-no-files-found: error
          retention-days: 30

  publish-pages:
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    needs: build-summary
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.publish.outputs.page_url }}
    steps:
      - name: Download combined test report artifact
        uses: actions/download-artifact@v4
        with:
          name: render-test-report-pr-${{ github.event.pull_request.number }}
          path: build/render-tests

      - name: Checkout gh-pages branch
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          repository: ${{ env.REPORTS_REPOSITORY }}
          fetch-depth: 1
          ref: ${{ env.REPORTS_BRANCH }}
          path: gh-pages
          token: ${{ secrets.SERVICES_GITHUB_TOKEN != '' && secrets.SERVICES_GITHUB_TOKEN || github.token }}

      - name: Publish report history to gh-pages
        id: publish
        env:
          REPORTS_REPOSITORY: ${{ env.REPORTS_REPOSITORY }}
          REPORTS_BRANCH: ${{ env.REPORTS_BRANCH }}
          REPORTS_SUBFOLDER: ${{ env.REPORTS_SUBFOLDER }}
          REPORTS_PUSH_TOKEN: ${{ secrets.SERVICES_GITHUB_TOKEN != '' && secrets.SERVICES_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail

          reports_repo="${REPORTS_REPOSITORY}"
          reports_owner="${reports_repo%%/*}"
          reports_name="${reports_repo#*/}"
          pr_number="${{ github.event.pull_request.number }}"
          reports_subfolder="${REPORTS_SUBFOLDER}"
          site_path_prefix=""
          if [[ -n "${reports_subfolder}" ]]; then
            site_path_prefix="${reports_subfolder}/"
          fi
          site_url="https://${reports_owner}.github.io/${reports_name}/${site_path_prefix}pr-${pr_number}/"
          pages_root="${PWD}/gh-pages"

          if [[ ! -d "${pages_root}/.git" ]]; then
            rm -rf "${pages_root}"
            mkdir -p "${pages_root}"
            git init "${pages_root}"
            git -C "${pages_root}" checkout --orphan "${REPORTS_BRANCH}"
            git -C "${pages_root}" remote add origin "https://x-access-token:${REPORTS_PUSH_TOKEN}@github.com/${reports_repo}.git"
          else
            git -C "${pages_root}" remote set-url origin "https://x-access-token:${REPORTS_PUSH_TOKEN}@github.com/${reports_repo}.git"
          fi

          git -C "${pages_root}" config user.name "github-actions[bot]"
          git -C "${pages_root}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pr_root="${pages_root}"
          if [[ -n "${reports_subfolder}" ]]; then
            pr_root="${pr_root}/${reports_subfolder}"
          fi
          pr_root="${pr_root}/pr-${pr_number}"
          rm -rf "${pr_root}"
          mkdir -p "${pr_root}"

          cp -R build/render-tests/. "${pr_root}/"
          touch "${pages_root}/.nojekyll"

          git -C "${pages_root}" add -A
          if git -C "${pages_root}" diff --cached --quiet; then
            echo "No gh-pages changes to commit"
          else
            git -C "${pages_root}" commit -m "html5 report for pr-${pr_number}"
            git -C "${pages_root}" push origin HEAD:${REPORTS_BRANCH}
          fi

          echo "page_url=${site_url}" >> "${GITHUB_OUTPUT}"

  update-pr:
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - test-html5
      - test-android
      - build-summary
      - publish-pages
    permissions:
      contents: read
      actions: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Download combined test report artifact
        uses: actions/download-artifact@v4
        with:
          name: render-test-report-pr-${{ github.event.pull_request.number }}
          path: build/render-tests

      - name: Update PR body with test results
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          SUMMARY_MD_PATH: build/render-tests/summary.md
          REPORT_ARTIFACT_URL: ${{ needs.build-summary.outputs.report_artifact_url }}
          PAGE_URL: ${{ needs.publish-pages.outputs.page_url }}
          PASS_COUNT: ${{ needs.build-summary.outputs.pass_count }}
          FAIL_COUNT: ${{ needs.build-summary.outputs.fail_count }}
          TOTAL_COUNT: ${{ needs.build-summary.outputs.total_count }}
        with:
          script: |
            const fs = require('fs');

            const summaryMdPath = process.env.SUMMARY_MD_PATH;
            const pageUrl = process.env.PAGE_URL;
            const reportArtifactUrl = process.env.REPORT_ARTIFACT_URL;
            const passCount = process.env.PASS_COUNT;
            const failCount = process.env.FAIL_COUNT;
            const totalCount = process.env.TOTAL_COUNT;
            const overallStatus = Number(failCount) === 0 ? 'success' : 'failure';
            const markerStart = '<!-- html5-tests:start -->';
            const markerEnd = '<!-- html5-tests:end -->';
            const summaryMd = fs.existsSync(summaryMdPath)
              ? fs.readFileSync(summaryMdPath, 'utf8').trimEnd()
              : '';

            const lines = [
              '#### Tests',
              markerStart,
              '',
              `Status: **${overallStatus}**`,
              `Summary: ✅ ${passCount} passed, ❌ ${failCount} failed${totalCount ? `, ${totalCount} total` : ''}`,
            ];

            if (pageUrl) {
              lines.push(`[Report](${pageUrl})`);
            }
            if (reportArtifactUrl) {
              lines.push(`[Artifact Zip](${reportArtifactUrl})`);
            }

            lines.push('');
            lines.push(summaryMd || '_No summary markdown was generated._');

            lines.push('');
            lines.push(markerEnd);

            const block = lines.join('\n');
            const pr = context.payload.pull_request;
            let body = pr.body || '';

            const markerRegex = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`);
            if (markerRegex.test(body)) {
              body = body.replace(markerRegex, `${markerStart}\n${block.split('\n').slice(2, -1).join('\n')}\n${markerEnd}`);
            } else {
              const technicalChangesRegex = /(^###\s*Technical changes[^\n]*\n)/m;
              const testsHeadingRegex = /(^####\s*Tests[^\n]*\n)/m;
              if (technicalChangesRegex.test(body)) {
                body = body.replace(technicalChangesRegex, `$1\n${block}\n`);
              } else if (testsHeadingRegex.test(body)) {
                body = body.replace(testsHeadingRegex, `${block}\n\n$1`);
              } else if (body.trim().length > 0) {
                body = `${body}\n\n${block}\n`;
              } else {
                body = `${block}\n`;
              }
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body,
            });

  verify-status:
    if: always()
    needs: [build-summary]
    runs-on: ubuntu-latest
    steps:
      - name: Verify Build Status
        shell: bash
        run: |
          test "${{ needs.build-summary.outputs.fail_count }}" = "0"
